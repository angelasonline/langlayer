<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Language Layer: Join</title>
<style>
  *{box-sizing:border-box;margin:0}
  body{font-family:Arial,Helvetica,sans-serif;background:#0F3532;color:#1B1F1E;line-height:1.5;
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:1.25rem 1rem 0.75rem}
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid #7FC4BC;outline-offset:2px}

  /* White card on dark teal (option 10b) */
  #signin{margin:auto;width:100%;max-width:480px;background:#fff;color:#1B1F1E;
    border-radius:16px;padding:30px 24px 28px;box-shadow:0 8px 22px rgba(0,0,0,0.25)}
  h1{font-size:1.35rem;font-weight:700;letter-spacing:-0.01em;color:#0F3532}
  .tag{color:#3C4341;font-size:.95rem;margin:.4rem 0 1rem}
  #evname{font-size:.95rem;font-weight:700;color:#20635B}
  label{display:block;font-size:.9rem;font-weight:700;margin:1rem 0 .35rem;color:#1B1F1E}
  input,select{width:100%;padding:.8rem .85rem;font:inherit;border:1.5px solid #C9C9C2;border-radius:10px;
    background:#fff;color:#1B1F1E;min-height:48px}
  input:focus,select:focus{outline:3px solid #297F75;outline-offset:2px;border-color:#297F75}
  ::placeholder{color:#5F6663}
  .seg{display:flex;border:1.5px solid #C9C9C2;border-radius:10px;overflow:hidden}
  .seg button{flex:1;padding:.75rem .5rem;font:inherit;font-weight:700;background:#fff;color:#0F3532;
    border:none;cursor:pointer;min-height:48px}
  .seg button[aria-pressed="true"]{background:#0F3532;color:#fff}
  .seg button:focus-visible{outline:3px solid #297F75;outline-offset:-3px}
  .go{margin-top:1.4rem;width:100%;padding:.9rem;font:inherit;font-size:1.05rem;font-weight:700;
    background:#0F3532;color:#fff;border:none;border-radius:10px;cursor:pointer;min-height:52px}
  .go:focus-visible{outline:3px solid #297F75;outline-offset:2px}
  .err{color:#B3261E;font-size:.9rem;font-weight:700;margin-top:.6rem;display:none}

  /* Empty state QR hint */
  .qrhint{width:64px;height:64px;background:#EFF6F5;border-radius:16px;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center}
  .qrhint span{width:30px;height:30px;background:repeating-conic-gradient(#0F3532 0 25%,#EFF6F5 0 50%);background-size:10px 10px}
  #signin.center{text-align:center}

  /* Feed state */
  #feedwrap{display:none;flex:1;flex-direction:column;width:100%;max-width:560px;margin:0 auto;
    background:#fff;border-radius:16px;padding:14px 16px}
  .bar{display:flex;align-items:center;gap:.5rem;padding:.7rem .9rem;font-size:.9rem;
    background:#EFF6F5;border-radius:12px;color:#123F3A}
  .bar strong{color:#0F3532}
  .dot{width:10px;height:10px;border-radius:50%;background:#B3261E;margin-left:auto;flex-shrink:0}
  .dot.on{background:#1E7F4F}
  #feed{flex:1;padding:1rem 0;display:flex;flex-direction:column;gap:.6rem;overflow-y:auto}
  .empty{margin:auto;text-align:center;color:#3C4341;font-size:.9rem;max-width:17rem}
  .bubble{background:#fff;border:1px solid #DDE4E2;border-radius:12px;padding:.8rem .9rem;font-size:1.05rem;animation:pop .18s ease-out}
  .bubble.emergency{border-color:#B3261E;background:#FDECEA;font-weight:700}
  .meta{margin-top:.4rem;font-size:.72rem;color:#4A514F}
  @keyframes pop{from{transform:translateY(6px);opacity:0}to{transform:none;opacity:1}}
  @media (prefers-reduced-motion:reduce){.bubble{animation:none}}

  footer{padding:1rem 0 .4rem;font-size:.78rem;color:#C8DBD8;text-align:center}
  footer a{color:#7FC4BC}

  @media (min-width:560px){
    body{padding:2rem 1.5rem 1rem}
    #signin{padding:36px 32px 32px}
    h1{font-size:1.5rem}
  }
</style>
<!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-hqSOSg9CcDjcpTnwd1ZQO.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>
</head>
<body>
<div id="signin">
  <h1>Language Layer</h1>
  <p class="tag">Every alert and event, in your language, automatically.</p>
  <p id="evname" style="font-size:.9rem;font-weight:600"></p>

  <label>I am joining as</label>
  <div class="seg" role="group" aria-label="Join as">
    <button type="button" id="kp" aria-pressed="true" onclick="setKind('person')">A person</button>
    <button type="button" id="kb" aria-pressed="false" onclick="setKind('business')">A business</button>
  </div>

  <label for="nm" id="nmlabel">First name</label>
  <input id="nm" required placeholder="e.g. Maria">

  <label for="lang">Language</label>
  <select id="lang"></select>

  <label for="fmt">Format</label>
  <select id="fmt"></select>

  <button class="go" onclick="join()">Join this space</button>
  <p class="err" id="err"></p>
</div>

<div id="feedwrap">
  <div class="bar"><strong id="who"></strong><span id="prefs" style="color:#123F3A"></span><span class="dot" id="dot"></span></div>
  <div id="feed" role="log" aria-live="polite" aria-label="Announcements in your language"><p class="empty">You are connected. Announcements will appear here in your language.</p></div>
</div>

<footer>Encrypted in transit. Content never stored. <a href="/security">Security</a></footer>

<script>
const $ = id => document.getElementById(id);
const code = new URLSearchParams(location.search).get('code');
let LANGINFO = {};
let kind = 'person', signMode = false;

async function boot(){
  if (!code){ $('signin').classList.add('center'); $('signin').innerHTML = '<div class="qrhint" aria-hidden="true"><span></span></div><h1>Language Layer</h1><p class="tag">You need an attendee link from an event host. Ask the host for the link or QR code to join.</p>'; return; }
  const r = await fetch(`/v1/events/${code}`);
  if (!r.ok){ $('signin').classList.add('center'); $('signin').innerHTML = '<div class="qrhint" aria-hidden="true"><span></span></div><h1>Language Layer</h1><p class="tag">That event was not found. It may have ended, or the server restarted. Ask your host for a fresh link.</p>'; return; }
  const d = await r.json();
  $('evname').textContent = d.name;
  LANGINFO = {}; d.languages.forEach(l => LANGINFO[l.tag] = l);
  $('lang').innerHTML = d.languages.map(l => `<option value="${l.tag}">${l.name}${l.voice ? '' : ' (text)'}</option>`).join('');
  $('lang').value = 'en';
  $('fmt').innerHTML = d.formats.filter(f => f.kind !== 'sign')
    .map(f => `<option value="${f.kind}">${f.label}</option>`).join('');
  $('lang').onchange = () => {
    const info = LANGINFO[$('lang').value] || {};
    signMode = info.tier === 'sign';
    $('fmt').disabled = signMode;
    if (signMode){ $('fmt').innerHTML = '<option value="sign">Sign language (text gloss for now)</option>'; return; }
    const opts = [`<option value="captions">Captions</option>`,
                  `<option value="simplified">Plain language</option>`];
    opts.push(info.voice
      ? `<option value="speech">Spoken audio</option>`
      : `<option value="speech">Spoken audio (no device voice yet, shows captions)</option>`);
    $('fmt').innerHTML = opts.join('');
  };
}
function setKind(k){ kind = k;
  $('kp').setAttribute('aria-pressed', k==='person'); $('kb').setAttribute('aria-pressed', k==='business');
  $('nmlabel').textContent = k==='person' ? 'First name' : 'Business name';
  $('nm').placeholder = k==='person' ? 'e.g. Maria' : 'e.g. Corner Cafe';
}
async function join(){
  const name = $('nm').value.trim();
  if (!name){ $('nm').focus(); return; }
  const r = await fetch(`/v1/events/${code}/join`, {method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({kind, name, language: $('lang').value, modality: $('fmt').value || 'captions'})});
  if (!r.ok){ $('err').textContent='Could not join. Try again.'; $('err').style.display='block'; return; }
  const d = await r.json();
  $('signin').style.display = 'none';
  $('feedwrap').style.display = 'flex';
  $('who').textContent = name;
  $('prefs').textContent = ' · ' + $('lang').selectedOptions[0].text + ' · ' + ($('fmt').selectedOptions[0]?.text || 'Sign language (text gloss for now)');
  connect(d.endpoint_id);
}
const VOICE_LANG = {en:'en-US', es:'es-MX', fr:'fr-FR', it:'it-IT', pt:'pt-BR', ru:'ru-RU',
  ar:'ar-SA', zh:'zh-CN', de:'de-DE', ja:'ja-JP', ko:'ko-KR', hi:'hi-IN', nl:'nl-NL',
  tr:'tr-TR', pl:'pl-PL', th:'th-TH', vi:'vi-VN', el:'el-GR', cs:'cs-CZ', da:'da-DK',
  fi:'fi-FI', hu:'hu-HU', id:'id-ID', nb:'nb-NO', ro:'ro-RO', sv:'sv-SE', uk:'uk-UA', he:'he-IL'};
function speak(text, lang){
  if (!('speechSynthesis' in window)) return false;
  const target = VOICE_LANG[lang] || lang;
  const voices = speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.toLowerCase().startsWith(target.split('-')[0].toLowerCase()));
  const u = new SpeechSynthesisUtterance(text);
  u.lang = match ? match.lang : target;
  if (match) u.voice = match;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
  return !!match || voices.length === 0; // empty list = voices not loaded yet, try anyway
}
function connect(endpointId){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/v1/deliveries/subscribe/${endpointId}`);
  ws.onopen = () => $('dot').classList.add('on');
  ws.onclose = () => { $('dot').classList.remove('on'); setTimeout(() => connect(endpointId), 1500); };
  ws.onmessage = ev => {
    const a = JSON.parse(ev.data);
    if (!a.delivered) return;
    $('feed').querySelector('.empty')?.remove();
    const clean = a.content.replace(/^\[[^\]]*\]\s*/, '');
    const b = document.createElement('div');
    b.className = 'bubble' + (a.priority_class === 'emergency' ? ' emergency' : '');
    b.innerHTML = `<div dir="auto">${clean}</div><div class="meta">${a.e2e_ms} ms${a.modality==='speech' ? ' &middot; tap to replay audio' : ''}</div>`;
    if (a.modality === 'speech'){
      const spoke = speak(clean, a.language);
      if (!spoke) b.querySelector('.meta').innerHTML += ' &middot; no device voice for this language, showing text';
      b.style.cursor = 'pointer';
      b.onclick = () => speak(clean, a.language);
    }
    $('feed').appendChild(b);
    $('feed').scrollTop = $('feed').scrollHeight;
    if (navigator.vibrate && a.priority_class === 'emergency') navigator.vibrate([180,80,180]);
  };
  setInterval(() => { if (ws.readyState === 1) ws.send('hb'); }, 30000);
}
boot();
</script>
</body>
</html>
