<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Language Layer: Join</title>
<style>
  *{box-sizing:border-box;margin:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#fff;color:#111;
    max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:1.4rem 1.2rem 1rem;line-height:1.5}
  h1{font-size:1.15rem;font-weight:600}
  .tag{color:#555;font-size:.85rem;margin:.2rem 0 1.2rem}
  label{display:block;font-size:.85rem;font-weight:600;margin:.9rem 0 .3rem}
  input,select{width:100%;padding:.7rem .8rem;font:inherit;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111}
  input:focus,select:focus{outline:2px solid #111}
  .seg{display:flex;border:1px solid #ccc;border-radius:8px;overflow:hidden}
  .seg button{flex:1;padding:.65rem;font:inherit;background:#fff;color:#111;border:none;cursor:pointer}
  .seg button[aria-pressed="true"]{background:#111;color:#fff}
  .go{margin-top:1.3rem;width:100%;padding:.8rem;font:inherit;font-weight:600;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer}
  .err{color:#B3261E;font-size:.85rem;margin-top:.6rem;display:none}
  #feedwrap{display:none;flex:1;flex-direction:column}
  .bar{display:flex;align-items:center;gap:.5rem;padding:.6rem 0;border-bottom:1px solid #eee;font-size:.85rem}
  .dot{width:9px;height:9px;border-radius:50%;background:#B3261E;margin-left:auto}
  .dot.on{background:#1E7F4F}
  #feed{flex:1;padding:1rem 0;display:flex;flex-direction:column;gap:.6rem;overflow-y:auto}
  .empty{margin:auto;text-align:center;color:#777;font-size:.85rem;max-width:17rem}
  .bubble{border:1px solid #ddd;border-radius:12px;padding:.75rem .85rem;font-size:1rem;animation:pop .18s ease-out}
  .bubble.emergency{border-color:#B3261E;background:#FBEAE9;font-weight:600}
  .meta{margin-top:.4rem;font-size:.68rem;color:#777}
  @keyframes pop{from{transform:translateY(6px);opacity:0}to{transform:none;opacity:1}}
  @media (prefers-reduced-motion:reduce){.bubble{animation:none}}
  footer{padding-top:.8rem;font-size:.72rem;color:#777;text-align:center}
  footer a{color:#777}
</style>
</head>
<body>
<div id="signin">
  <h1>Language Layer</h1>
  <p class="tag">Every announcement, in your language, automatically.</p>
  <p id="evname" style="font-size:.9rem;font-weight:600"></p>

  <label>I am joining as</label>
  <div class="seg" role="group" aria-label="Join as">
    <button type="button" id="kp" aria-pressed="true" onclick="setKind('person')">A person</button>
    <button type="button" id="kb" aria-pressed="false" onclick="setKind('business')">A business</button>
  </div>

  <label for="nm" id="nmlabel">First name</label>
  <input id="nm" required placeholder="e.g. Maria">

  <label for="lang">Language</label>
  <select id="lang"></select>

  <label for="fmt">Format</label>
  <select id="fmt"></select>

  <button class="go" onclick="join()">Join event</button>
  <p class="err" id="err"></p>
</div>

<div id="feedwrap">
  <div class="bar"><strong id="who"></strong><span id="prefs" style="color:#555"></span><span class="dot" id="dot"></span></div>
  <div id="feed"><p class="empty">You are connected. Announcements will appear here in your language.</p></div>
</div>

<footer>Encrypted in transit. Content never stored. <a href="/security">Security</a></footer>

<script>
const $ = id => document.getElementById(id);
const code = new URLSearchParams(location.search).get('code');
let kind = 'person', signMode = false;

async function boot(){
  if (!code){ $('signin').innerHTML = '<h1>Language Layer</h1><p class="tag">This page needs an attendee link from an event host. Ask your host for the link or QR code.</p>'; return; }
  const r = await fetch(`/v1/events/${code}`);
  if (!r.ok){ $('signin').innerHTML = '<h1>Language Layer</h1><p class="tag">That event was not found. It may have ended, or the server restarted. Ask your host for a fresh link.</p>'; return; }
  const d = await r.json();
  $('evname').textContent = d.name;
  $('lang').innerHTML = d.languages.map(l => `<option value="${l.tag}">${l.name}</option>`).join('');
  $('lang').value = 'en';
  $('fmt').innerHTML = d.formats.filter(f => f.kind !== 'sign')
    .map(f => `<option value="${f.kind}">${f.label}</option>`).join('');
  $('lang').onchange = () => {
    signMode = $('lang').value === 'asl';
    $('fmt').disabled = signMode;
    if (signMode) $('fmt').innerHTML = '<option value="sign">Sign language</option>';
    else $('fmt').innerHTML = 'captions,simplified,speech'.split(',').map(k =>
      `<option value="${k}">${k==='captions'?'Captions':k==='simplified'?'Plain language':'Spoken audio'}</option>`).join('');
  };
}
function setKind(k){ kind = k;
  $('kp').setAttribute('aria-pressed', k==='person'); $('kb').setAttribute('aria-pressed', k==='business');
  $('nmlabel').textContent = k==='person' ? 'First name' : 'Business name';
  $('nm').placeholder = k==='person' ? 'e.g. Maria' : 'e.g. Corner Cafe';
}
async function join(){
  const name = $('nm').value.trim();
  if (!name){ $('nm').focus(); return; }
  const r = await fetch(`/v1/events/${code}/join`, {method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({kind, name, language: $('lang').value, modality: $('fmt').value || 'captions'})});
  if (!r.ok){ $('err').textContent='Could not join. Try again.'; $('err').style.display='block'; return; }
  const d = await r.json();
  $('signin').style.display = 'none';
  $('feedwrap').style.display = 'flex';
  $('who').textContent = name;
  $('prefs').textContent = ' · ' + $('lang').selectedOptions[0].text + ' · ' + ($('fmt').selectedOptions[0]?.text || 'Sign language');
  connect(d.endpoint_id);
}
function connect(endpointId){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/v1/deliveries/subscribe/${endpointId}`);
  ws.onopen = () => $('dot').classList.add('on');
  ws.onclose = () => { $('dot').classList.remove('on'); setTimeout(() => connect(endpointId), 1500); };
  ws.onmessage = ev => {
    const a = JSON.parse(ev.data);
    if (!a.delivered) return;
    $('feed').querySelector('.empty')?.remove();
    const b = document.createElement('div');
    b.className = 'bubble' + (a.priority_class === 'emergency' ? ' emergency' : '');
    b.innerHTML = `<div dir="auto">${a.content}</div><div class="meta">${a.e2e_ms} ms</div>`;
    $('feed').appendChild(b);
    $('feed').scrollTop = $('feed').scrollHeight;
    if (navigator.vibrate && a.priority_class === 'emergency') navigator.vibrate([180,80,180]);
  };
  setInterval(() => { if (ws.readyState === 1) ws.send('hb'); }, 30000);
}
boot();
</script>
</body>
</html>
