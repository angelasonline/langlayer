<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Language Layer: Host Console</title>
<style>
  *{box-sizing:border-box;margin:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#fff;color:#111;
    max-width:760px;margin:0 auto;padding:1.6rem 1.2rem 3rem;line-height:1.5}
  h1{font-size:1.15rem;font-weight:600}
  .tag{color:#555;font-size:.85rem;margin:.2rem 0 1rem}
  .chips{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem}
  .chip{border:1px solid #ddd;border-radius:999px;padding:.3rem .8rem;font-size:.78rem;color:#333}
  .chip b{color:#111}
  textarea{width:100%;min-height:4rem;resize:vertical;padding:.7rem .8rem;font:inherit;
    border:1px solid #ccc;border-radius:8px;background:#fff;color:#111}
  textarea:focus{outline:2px solid #111}
  .row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.7rem}
  select,button{font:inherit;padding:.6rem .9rem;border-radius:8px;border:1px solid #ccc;background:#fff;color:#111;cursor:pointer}
  button.primary{background:#111;color:#fff;border-color:#111;font-weight:600}
  button.danger{border-color:#B3261E;color:#B3261E}
  h2{font-size:.85rem;font-weight:600;margin:1.6rem 0 .5rem}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th{text-align:left;color:#555;font-weight:600;padding:.35rem .4rem;border-bottom:1px solid #ddd}
  td{padding:.4rem;border-bottom:1px solid #eee}
  #sent{display:flex;flex-direction:column;gap:.5rem;margin-top:.4rem}
  .msg{border:1px solid #ddd;border-radius:10px;padding:.6rem .8rem;font-size:.88rem}
  .msg .meta{font-size:.7rem;color:#777;margin-top:.3rem}
  footer{margin-top:2.2rem;font-size:.75rem;color:#777}
  footer a{color:#777}
</style>
</head>
<body>
<h1 id="evname">Host console</h1>
<p class="tag">Every announcement, in your language, automatically.</p>
<div class="chips">
  <span class="chip">code: <b id="code"></b></span>
  <span class="chip">connected: <b id="live">0</b></span>
  <span class="chip">languages: <b id="langs">0</b></span>
  <span class="chip">deliveries: <b id="dels">0</b></span>
  <span class="chip">est. cost: <b id="cost">$0.00</b></span>
</div>

<textarea id="msg" placeholder="Type an announcement. Everyone connected receives it in their own language and format."></textarea>
<div class="row">
  <select id="klass" aria-label="Priority">
    <option value="announcement">announcement</option>
    <option value="conversational">conversational</option>
    <option value="live">live</option>
    <option value="emergency">emergency</option>
  </select>
  <button class="primary" onclick="send()">Send announcement</button>
  <button onclick="copyAttendee()">Copy attendee link</button>
  <button onclick="downloadTranscript()">Download transcript</button>
</div>

<h2>Sent</h2>
<div id="sent"></div>

<h2>Attendee log</h2>
<table><thead><tr><th>Name</th><th>Type</th><th>Language</th><th>Format</th><th>Joined</th></tr></thead>
<tbody id="log"></tbody></table>

<footer>Encrypted in transit. Content never stored. <a href="/security">Security</a></footer>

<script>
const $ = id => document.getElementById(id);
const code = new URLSearchParams(location.search).get('code');
let CHANNEL = null;

async function boot(){
  if (!code){ document.body.innerHTML = '<h1>Host console</h1><p>This page needs a host link. Create an event at <a href="/host">/host</a>.</p>'; return; }
  const r = await fetch(`/v1/events/${code}`);
  if (!r.ok){ document.body.innerHTML = '<h1>Host console</h1><p>Event not found. It may have ended, or the server restarted. Create a new one at <a href="/host">/host</a>.</p>'; return; }
  const d = await r.json();
  CHANNEL = d.channel_id;
  $('evname').textContent = d.name;
  $('code').textContent = code;
  refresh(); setInterval(refresh, 3000);
}
async function refresh(){
  try{
    const a = await (await fetch(`/v1/events/${code}/attendees`)).json();
    $('live').textContent = a.live.length;
    $('log').innerHTML = a.log.map(x => `<tr><td>${x.name}</td><td>${x.kind}</td>
      <td>${x.language}</td><td>${x.format === 'simplified' ? 'plain language' : x.format}</td>
      <td>${new Date(x.joined_ms).toLocaleTimeString()}</td></tr>`).join('');
    const s = await (await fetch(`/v1/events/${code}/summary`)).json();
    $('langs').textContent = s.languages.length;
    $('dels').textContent = s.delivered;
    $('cost').textContent = '$' + s.estimated_cost_usd.toFixed(2);
  }catch(e){}
}
async function send(){
  const text = $('msg').value.trim();
  if (!text){ $('msg').focus(); return; }
  const r = await fetch(`/v1/channels/${CHANNEL}/events`, {method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({channel_id: CHANNEL, priority_class: $('klass').value, payload: text})});
  const d = await r.json();
  const ok = d.receipts.filter(x => x.delivered).length;
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `${text}<div class="meta">${ok}/${d.receipts.length} delivered · ${$('klass').value}</div>`;
  $('sent').prepend(div);
  $('msg').value = '';
  refresh();
}
function copyAttendee(){
  navigator.clipboard.writeText(`${location.origin}/join?code=${code}`);
}
async function downloadTranscript(){
  const t = await (await fetch(`/v1/events/${code}/transcript`)).json();
  const blob = new Blob([JSON.stringify(t, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `language-layer-transcript-${code}.json`;
  a.click();
}
$('msg').addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }});
boot();
</script>
</body>
</html>
